<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - BodyPilot</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">
        <span class="logo-icon">B</span>
        Body<span class="logo-accent">Pilot</span>
      </div>

      <div id="error-msg" style="display:none; background:#FEE; color:#C33; padding:10px 14px; border-radius:8px; font-size:0.85rem; margin-bottom:16px; text-align:center;"></div>

      <div class="auth-section-title">無料会員登録</div>
      <p class="auth-desc">簡単1分で登録完了。すぐに食事管理を始められます。</p>

      <form id="registerForm">
        <div class="auth-form-section">
          <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" placeholder="ユーザー名を入力" required minlength="2">
          </div>
          <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
          </div>
          <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="8文字以上で入力" required minlength="8">
          </div>
          <div class="form-group">
            <label for="password-confirm">パスワード(確認)</label>
            <input type="password" id="password-confirm" placeholder="もう一度入力" required minlength="8">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="register-btn">登録する</button>
      </form>

      <div class="social-section">
        <div class="auth-section-title">他サービスで登録</div>
        <div class="social-login">
          <button class="btn-social" onclick="googleRegister()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Googleで登録
          </button>
          <button class="btn-social" onclick="googleRegister()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#333" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Appleで登録
          </button>
        </div>
      </div>

      <div class="auth-footer">
        <p>すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
        <p style="margin-top: 8px;"><a href="../index.html" style="color: var(--text-light);">トップに戻る</a></p>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    Auth.init();
    setTimeout(() => {
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }
    }, 200);

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      const pwConfirm = document.getElementById('password-confirm').value;

      if (pw !== pwConfirm) {
        errEl.textContent = 'パスワードが一致しません';
        errEl.style.display = 'block';
        return;
      }

      if (pw.length < 8) {
        errEl.textContent = 'パスワードは8文字以上で入力してください';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = '登録中...';
      btn.disabled = true;

      try {
        await Auth.register(email, pw, username);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = '登録する';
        btn.disabled = false;
      }
    });

    async function googleRegister() {
      try {
        await Auth.loginWithGoogle();
        window.location.href = 'dashboard.html';
      } catch (err) {
        const errEl = document.getElementById('error-msg');
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
